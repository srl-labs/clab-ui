name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build package and viewer
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

  browser-tests:
    name: Browser tests (${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          install-dependencies: true

      - name: Verify Chrome version
        run: |
          "${{ steps.setup-chrome.outputs.chrome-path }}" --version

      - name: Browser harness tests
        env:
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run test:browser -- --shard=${{ matrix.shard }}/4

      - name: Upload Playwright blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: blob-report-${{ matrix.shard }}-${{ github.run_attempt }}
          path: blob-report/
          if-no-files-found: ignore
          retention-days: 1

  test:
    if: ${{ !cancelled() }}
    needs: [checks, browser-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download Playwright blob reports
        uses: actions/download-artifact@v8
        with:
          path: all-blob-reports
          pattern: blob-report-*-${{ github.run_attempt }}
          merge-multiple: true

      - name: Merge Playwright reports
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: clab-ui-playwright-report-${{ github.run_number }}-${{ github.run_attempt }}
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 30

      - name: Verify required jobs
        if: ${{ always() }}
        env:
          CHECKS_RESULT: ${{ needs.checks.result }}
          BROWSER_TESTS_RESULT: ${{ needs.browser-tests.result }}
        run: |
          test "$CHECKS_RESULT" = "success"
          test "$BROWSER_TESTS_RESULT" = "success"
